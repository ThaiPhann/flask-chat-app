<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ room.name }} - Chat</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/view_room.css') }}"
    />
  </head>
  <body>
    <div class="chat-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <h3>Members</h3>
        {% for member in room_members %}
        <div class="member">{{ member._id.username }}</div>
        {% endfor %}
        <a href="/"><button class="leave-btn" type="button">Leave</button></a>
      </div>

      <!-- Chat -->
      <div class="chat-main">
        <div class="chat-header">
          {{ room.name }} (<span id="online_count">0</span> online)
        </div>
        {% if messages.isNext %}
        <button class="load-btn" id="load_older_messages_btn">
          Load older messages
        </button>
        {% else %}
        <button class="load-btn hidden" id="load_older_messages_btn">
          Load older messages
        </button>
        {% endif %}
        <div id="messages" class="messages">
          {% for message in messages.messages | reverse %}
          <div
            class="message {% if message.sender == current_user.username %}self{% endif %}"
          >
            <div class="meta">
              {{ message.sender }} • {{ message.created_at }}
            </div>
            <div class="bubble">{{ message.text }}</div>
          </div>
          {% endfor %}
        </div>
        <div id="typing_indicator" class="typing"></div>

        <form id="message_input_form" class="chat-input">
          <input
            type="text"
            id="message_input"
            placeholder="Type a message..."
          />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
      let typingUsers = new Set();
      const socket = io.connect("http://{{ host }}:5000");
      socket.on("connect", function () {
        socket.emit("join_room", {
          username: "{{ current_user.username }}",
          room: "{{ room._id }}",
        });

        let input = document.getElementById("message_input");

        document.getElementById("message_input_form").onsubmit = function (e) {
          e.preventDefault();
          let message = input.value.trim();
          if (message.length) {
            socket.emit("send_message", {
              username: "{{ current_user.username }}",
              room: "{{ room._id }}",
              message: message,
            });
          }
          input.value = "";
          input.focus();
          if (message.includes("@ChatAI")) {
            typingUsers.add("ChatBot");
            renderTyping();
            // giả lập bot đang gõ 2s
            setTimeout(() => {
              typingUsers.delete("ChatBot");
              renderTyping();
            }, 5000);
          }
        };
      });

      const appendMessage = (msg, user, time) => {
        const div = document.createElement("div");
        const isSelf = user === "{{ current_user.username }}";

        div.className = "message " + (isSelf ? "self" : "");

        div.innerHTML = `
          <div class="meta">${user} • ${time}</div>
          <div class="bubble">${marked.parse(msg)}</div>
        `;

        const messages = document.getElementById("messages");
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      };
      let page = 0;

      const load_older_messages_btn = document.getElementById(
        "load_older_messages_btn",
      );

      load_older_messages_btn.onclick = (e) => {
        page += 1;
        fetch(`/rooms/{{ room._id }}/messages?page=${page}`, {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
          },
        }).then((response) =>
          response.json().then((messages) => {
            console.log(messages);
            messages.messages.forEach((e) => {
              prepend_message(e.text, e.sender, e.created_at);
            });
            if (!messages.isNext) {
              load_older_messages_btn.classList.add("hidden");
            }
          }),
        );
        setTimeout(() => {
          document.getElementById("messages").scrollTo({
            top: 0,
            behavior: "smooth",
          });
        }, 0);
      };

      const prepend_message = (msg, user, time) => {
        const div = document.createElement("div");
        const isSelf = user === "{{ current_user.username }}";

        div.className = "message " + (isSelf ? "self" : "");
        div.innerHTML = `
              <div class="meta">${user} • ${time}</div>
              <div class="bubble">${marked.parse(msg)}</div>
            `;

        document
          .getElementById("messages")
          .insertBefore(div, document.getElementById("messages").firstChild);
        document.getElementById("messages").scrollTop =
          document.getElementById("messages").scrollHeight;
      };

      window.onbeforeunload = function () {
        socket.emit("leave_room", {
          username: "{{ current_user.username }}",
          room: "{{ room._id }}",
        });
      };

      socket.on("receive_message", (data) => {
        appendMessage(data.message, data.username, data.created_at);
      });

      socket.on("join_room_announcement", (data) => {
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = `${data.username} joined the room`;
        document.getElementById("messages").appendChild(div);
      });

      socket.on("leave_room_announcement", (data) => {
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = `${data.username} left the room`;
        document.getElementById("messages").appendChild(div);
      });

      const input = document.getElementById("message_input");
      let typingTimeout;

      input.addEventListener("input", () => {
        socket.emit("typing", {
          username: "{{ current_user.username }}",
          room: "{{ room._id }}",
        });

        clearTimeout(typingTimeout);

        typingTimeout = setTimeout(() => {
          socket.emit("stop_typing", {
            username: "{{ current_user.username }}",
            room: "{{ room._id }}",
          });
        }, 1000);
      });

      socket.on("typing", (data) => {
        typingUsers.add(data.username);
        renderTyping();
      });

      socket.on("stop_typing", (data) => {
        typingUsers.delete(data.username);
        renderTyping();
      });

      function renderTyping() {
        const el = document.getElementById("typing_indicator");

        if (typingUsers.size === 0) {
          el.innerText = "";
        } else if (typingUsers.size === 1) {
          if ([...typingUsers][0].includes("ChatBot")) {
            el.innerText = [...typingUsers][0] + " is typing...";
          } else el.innerText = [...typingUsers][0] + " is typing...";
        } else {
          el.innerText = "Several people are typing...";
        }
      }

      socket.on("online_users", (users) => {
        const members = document.querySelectorAll(".member");

        members.forEach((el) => {
          const username = el.innerText;

          if (users.includes(username)) {
            el.classList.add("online");
            el.classList.remove("offline");
          } else {
            el.classList.add("offline");
            el.classList.remove("online");
          }
        });
      });

      socket.on("online_users", (users) => {
        document.getElementById("online_count").innerText = users.length;
      });
    </script>
  </body>
  <div id="overlay" class="overlay"></div>
</html>
